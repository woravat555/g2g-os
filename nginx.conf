# G2G OS · nginx config
# Static site · health probe · clean URLs · cache headers

server {
  listen 8080 default_server;
  listen [::]:8080 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    text/html
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Cache static assets
  location ~* \.(css|js|svg|woff2?|png|jpg|jpeg|webp|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # Citizen ID public profile · /c/{slug} → always serve /c/index.html (JS reads slug from URL)
  location ~ ^/c/[a-zA-Z0-9_-]+/?$ {
    try_files $uri /c/index.html;
  }

  # PHAT Invite · /i/{token} → always serve /i/index.html (JS reads token from URL)
  location ~ ^/i/[a-zA-Z0-9_-]+/?$ {
    try_files $uri /i/index.html;
  }

  # Clean URLs · /about → /about.html
  location / {
    try_files $uri $uri.html $uri/index.html $uri/ =404;
  }

  # Health probe
  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Custom 404 falls back to index
  error_page 404 /index.html;
}
