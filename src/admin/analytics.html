<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analytics · G2G</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_admin.css">
<style>
  .bar { height: 22px; background: var(--bg); border-radius: 6px; overflow: hidden; margin-top: 4px; }
  .bar-fill { height: 100%; background: linear-gradient(90deg,#4F46E5,#9333EA); border-radius: 6px; }
  .stat-card { padding: 18px; border-radius: 12px; border: 1px solid var(--line); background: #fff; }
  .stat-card .v { font-size: 26px; font-weight: 700; color: var(--ink-1); }
  .stat-card .l { font-size: 12px; color: var(--ink-4); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="adm-shell">
  <aside class="adm-side"></aside>
  <div class="adm-main">
    <header class="adm-top"></header>
    <main class="adm-body">
      <div class="wb-hero">
        <div class="role-line">📊 Analytics · Token Consumption + System Activity</div>
        <h1>📊 Analytics</h1>
        <p id="ts">กำลังโหลด...</p>
      </div>

      <div class="qstats">
        <div class="stat-card"><div class="l">Total Tokens (7 วัน)</div><div class="v" id="k-total">—</div></div>
        <div class="stat-card"><div class="l">Studio Images</div><div class="v" id="k-img">—</div></div>
        <div class="stat-card"><div class="l">Voice Generations</div><div class="v" id="k-voice">—</div></div>
        <div class="stat-card"><div class="l">Active Triggers</div><div class="v" id="k-triggers">—</div></div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>🏆 By Staff (7 days)</h2></div>
        <div class="adm-card flat"><div id="by-staff" style="padding:16px"></div></div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>📦 By Reason / Tool</h2></div>
        <div class="adm-card flat"><div id="by-reason" style="padding:16px"></div></div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>⏰ Cron Triggers (active)</h2></div>
        <div class="adm-card flat"><div id="triggers-list" style="padding:16px"></div></div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>🔍 Global Search</h2></div>
        <div class="adm-card">
          <div class="adm-card-b">
            <div style="display:flex;gap:8px;margin-bottom:12px">
              <input id="search-q" placeholder="ค้นหา themes / facts / tasks..." style="flex:1;padding:10px;border:1px solid var(--line);border-radius:8px" onkeydown="if(event.key==='Enter')doSearch()">
              <button class="btn btn-primary" onclick="doSearch()">ค้น</button>
            </div>
            <div id="search-results"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="_admin.js"></script>
<script>
G2G.boot('analytics', { title: 'Analytics · G2G', crumbs: [{ label: 'Dashboard', href: 'index.html' }, { label: 'Analytics' }] });

async function loadAnalytics() {
  document.getElementById('ts').textContent = 'ข้อมูล ณ ' + new Date().toLocaleString('th-TH');
  // Token usage
  const r = await G2G.apiGet('analyticsTokenUsage', { days: 7 });
  if (r && r.ok) {
    document.getElementById('k-total').textContent = (r.totalCharged || 0).toLocaleString();
    document.getElementById('k-img').textContent = (r.byReason && r.byReason.studioImage) || 0;
    document.getElementById('k-voice').textContent = (r.byReason && r.byReason.studioVoice) || 0;

    const byStaff = Object.entries(r.byStaff || {}).sort((a,b) => b[1]-a[1]);
    const maxStaff = Math.max(1, ...byStaff.map(x => x[1]));
    document.getElementById('by-staff').innerHTML = byStaff.length
      ? byStaff.map(([slug, amt]) => `
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between"><span>${G2G.escapeHtml(slug)}</span><span style="font-family:monospace">${amt.toLocaleString()}</span></div>
            <div class="bar"><div class="bar-fill" style="width:${(amt/maxStaff*100).toFixed(1)}%"></div></div>
          </div>`).join('')
      : '<p style="color:#9CA3AF">ยังไม่มี token usage</p>';

    const byReason = Object.entries(r.byReason || {}).sort((a,b) => b[1]-a[1]);
    const maxR = Math.max(1, ...byReason.map(x => x[1]));
    document.getElementById('by-reason').innerHTML = byReason.length
      ? byReason.map(([reason, amt]) => `
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between"><span>${G2G.escapeHtml(reason)}</span><span style="font-family:monospace">${amt.toLocaleString()}</span></div>
            <div class="bar"><div class="bar-fill" style="width:${(amt/maxR*100).toFixed(1)}%"></div></div>
          </div>`).join('')
      : '<p style="color:#9CA3AF">ยังไม่มี usage</p>';
  }

  // Triggers
  const t = await G2G.apiPost('adminListTriggers', { masterKey: prompt('Master key (สำหรับดู triggers list):', '168147') || '' });
  if (t && t.ok) {
    document.getElementById('k-triggers').textContent = t.total;
    document.getElementById('triggers-list').innerHTML = '<table class="adm-tbl"><thead><tr><th>Handler</th><th>Type</th></tr></thead><tbody>' +
      t.triggers.map(tg => `<tr><td>${G2G.escapeHtml(tg.handler)}</td><td>${G2G.escapeHtml(tg.type)}</td></tr>`).join('') + '</tbody></table>';
  }
}

async function doSearch() {
  const q = document.getElementById('search-q').value.trim();
  if (!q) return;
  const out = document.getElementById('search-results');
  out.innerHTML = 'กำลังค้น...';
  const r = await G2G.apiPost('globalSearch', { q });
  if (!r || !r.ok) { out.innerHTML = '<p style="color:#EF4444">Error: ' + (r && r.error || 'unknown') + '</p>'; return; }
  const res = r.results;
  let html = `<div style="margin-bottom:12px;color:#6B7280">พบ ${res.total} รายการ</div>`;
  if (res.themes.length) {
    html += '<h4 style="margin:10px 0">🧠 Themes (' + res.themes.length + ')</h4>';
    html += res.themes.map(t => `<div style="padding:8px;background:var(--bg);margin:4px 0;border-radius:6px;font-size:12px">${G2G.escapeHtml(JSON.stringify(t.data).substring(0,200))}</div>`).join('');
  }
  if (res.facts.length) {
    html += '<h4 style="margin:10px 0">📌 Facts (' + res.facts.length + ')</h4>';
    html += res.facts.map(t => `<div style="padding:8px;background:var(--bg);margin:4px 0;border-radius:6px;font-size:12px">${G2G.escapeHtml(JSON.stringify(t.data).substring(0,200))}</div>`).join('');
  }
  if (res.tasks.length) {
    html += '<h4 style="margin:10px 0">📋 Tasks (' + res.tasks.length + ')</h4>';
    html += res.tasks.map(t => `<div style="padding:8px;background:var(--bg);margin:4px 0;border-radius:6px;font-size:12px">${G2G.escapeHtml(JSON.stringify(t.data).substring(0,200))}</div>`).join('');
  }
  if (res.total === 0) html += '<p style="color:#9CA3AF">ไม่พบผลลัพธ์</p>';
  out.innerHTML = html;
}

loadAnalytics();
</script>
</body>
</html>
