<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>งาน · Tasks · G2G Internal OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_admin.css">
</head>
<body>
<div class="adm-shell">
  <aside class="adm-side"></aside>
  <div class="adm-main">
    <header class="adm-top"></header>
    <main class="adm-body">

      <div class="qstats">
        <div class="kpi"><div class="lbl">MasterTaskList</div><div class="val" id="kMaster">—</div><div class="delta">งานหลักของบริษัท</div></div>
        <div class="kpi"><div class="lbl">TaskDelegation</div><div class="val" id="kDeleg">—</div><div class="delta">งานที่มอบหมาย</div></div>
        <div class="kpi"><div class="lbl">SharedTasks</div><div class="val" id="kShared">—</div><div class="delta">งานร่วม</div></div>
        <div class="kpi"><div class="lbl">AI Agents</div><div class="val" id="kAgents">—</div><div class="delta">9 agents · 24/7</div></div>
      </div>

      <div class="adm-section">
        <div class="h">
          <h2>Master Task List</h2>
          <span class="sub">งานหลักของบริษัท</span>
        </div>
        <div class="adm-card flat">
          <div id="task-master"><div class="adm-loading">โหลด...</div></div>
        </div>
      </div>

      <div class="adm-section">
        <div class="h">
          <h2>Task Delegation</h2>
          <span class="sub">งานที่มอบหมาย CEO → ทีม / AI Agent</span>
        </div>
        <div class="adm-card flat">
          <div id="task-deleg"><div class="adm-loading">โหลด...</div></div>
        </div>
      </div>

      <div class="adm-section">
        <div class="h">
          <h2>AI Agents Team</h2>
          <span class="sub">9 AI Agents · ทำงาน 24/7</span>
        </div>
        <div class="adm-card flat">
          <div id="agents-list"><div class="adm-loading">โหลด...</div></div>
        </div>
      </div>

    </main>
  </div>
</div>
<script src="_admin.js"></script>
<script>
  G2G.boot('tasks', { title: 'งาน · Tasks', crumbs: [{ label: 'Dashboard', href: 'index.html' }, { label: 'งาน' }] });
  (async function() {
    const stats = await G2G.loadDashboard();
    const c = stats.counts || {};
    document.getElementById('kMaster').textContent = c.MasterTaskList ?? '—';
    document.getElementById('kAgents').textContent = c.Agents ?? '—';

    const m = await G2G.loadTab('MasterTaskList');
    document.getElementById('kMaster').textContent = m.total ?? '—';
    G2G.renderTable(document.getElementById('task-master'), m.columns || [], m.rows || [], { maxRows: 50 });

    const d = await G2G.loadTab('TaskDelegation');
    document.getElementById('kDeleg').textContent = d.total ?? '—';
    G2G.renderTable(document.getElementById('task-deleg'), d.columns || [], d.rows || [], { maxRows: 30 });

    const s = await G2G.loadTab('SharedTasks');
    document.getElementById('kShared').textContent = s.total ?? '—';

    const a = await G2G.loadTab('Agents');
    G2G.renderTable(document.getElementById('agents-list'), a.columns || [], a.rows || [], { maxRows: 50 });
  })();
</script>
</body>
</html>
