<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>งานรวม · Master Board · G2G</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_admin.css">
</head>
<body>
<div class="adm-shell">
  <aside class="adm-side"></aside>
  <div class="adm-main">
    <header class="adm-top"></header>
    <main class="adm-body">

      <div class="qstats">
        <div class="kpi"><div class="lbl">เปิด/รอเรียก</div><div class="val" id="k-open">—</div></div>
        <div class="kpi"><div class="lbl">กำลังทำ</div><div class="val" id="k-claim">—</div></div>
        <div class="kpi"><div class="lbl">In Progress</div><div class="val" id="k-prog">—</div></div>
        <div class="kpi"><div class="lbl">เสร็จแล้ว</div><div class="val" id="k-done">—</div></div>
        <div class="kpi"><div class="lbl">พนักงาน</div><div class="val" id="k-staff">—</div></div>
      </div>

      <div class="adm-section">
        <div class="h">
          <h2>งานทั้งหมด · Master Pool</h2>
          <span class="sub">filter หมวด · สถานะ · ผู้รับ</span>
        </div>
        <div class="adm-card">
          <div class="adm-card-b" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <select id="f-status" onchange="loadBoard()" style="padding:8px 12px;border:1px solid var(--line);border-radius:6px">
              <option value="">ทุกสถานะ</option>
              <option value="open">เปิด/รอเรียก</option>
              <option value="claimed">เรียกแล้ว</option>
              <option value="in_progress">กำลังทำ</option>
              <option value="done">เสร็จ</option>
            </select>
            <select id="f-cat" onchange="loadBoard()" style="padding:8px 12px;border:1px solid var(--line);border-radius:6px">
              <option value="">ทุกหมวด</option>
              <option value="Marketing">Marketing</option>
              <option value="IT">IT</option>
              <option value="Service-AIM">Service-AIM</option>
              <option value="Service-NK">Service-NK</option>
              <option value="Gem">Gem/Jewelry</option>
              <option value="Factory">Factory</option>
              <option value="Distillery">Distillery</option>
              <option value="Accounting">Accounting</option>
              <option value="News">News/Press</option>
              <option value="AI">AI/Solution</option>
              <option value="Executive">Executive</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="openCreate()">+ สร้างงานใหม่</button>
            <button class="btn btn-outline btn-sm" onclick="loadBoard()">↻ Refresh</button>
          </div>
        </div>
      </div>

      <div class="adm-section">
        <div class="task-grid" id="board-grid"><div class="adm-loading">โหลด...</div></div>
      </div>

      <div id="staff-strip" class="adm-section">
        <div class="h"><h2>ทีมงาน · เลือกหน้าของแต่ละคน</h2></div>
        <div id="staff-list" class="adm-grid adm-grid-4" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px"></div>
      </div>

    </main>
  </div>
</div>

<script src="_admin.js"></script>
<script>
G2G.boot('board', { title: 'งานรวม · Master Board', crumbs: [
  { label: 'Dashboard', href: 'index.html' },
  { label: 'Workboard' }
]});
G2G.installTools('หน้านี้คือ Master Pool ของงานทั้งหมด พนักงานทุกคนสามารถดูงานในหมวดของตนเอง และเรียกงานไปทำได้ ปุ่มสร้างงานใหม่ใช้สำหรับ CEO และหัวหน้าฝ่าย', 'niwat');

let allTasks = [];
async function loadBoard() {
  const status = document.getElementById('f-status').value;
  const cat = document.getElementById('f-cat').value;
  const filters = {};
  if (status) filters.status = status;
  if (cat) filters.category = cat;
  allTasks = await G2G.wbListPool(filters);
  document.getElementById('k-open').textContent = allTasks.filter(t => t.status === 'open').length;
  document.getElementById('k-claim').textContent = allTasks.filter(t => t.status === 'claimed').length;
  document.getElementById('k-prog').textContent = allTasks.filter(t => t.status === 'in_progress').length;
  document.getElementById('k-done').textContent = allTasks.filter(t => t.status === 'done').length;
  renderBoard(allTasks);
}

function renderBoard(tasks) {
  const target = document.getElementById('board-grid');
  if (!tasks.length) {
    target.innerHTML = '<div class="adm-empty"><h4>ยังไม่มีงาน</h4></div>';
    return;
  }
  const staffMap = window._staffMap || {};
  target.innerHTML = tasks.map(t => {
    const color = (staffMap[t.assignee] && staffMap[t.assignee].color) || '#C9A961';
    return `<div class="task-card status-${t.status}" style="--staff-color:${color}">
      <span class="cat">${G2G.escapeHtml(t.category)}</span>
      <h4>${G2G.escapeHtml(t.title)}</h4>
      <div class="desc">${G2G.escapeHtml((t.description || '').substring(0, 150))}</div>
      <div class="meta">
        <span>${t.priority || ''} · ${t.status}</span>
        ${t.assignee ? `<span class="worker">→ ${G2G.escapeHtml(t.assignee)}</span>` : '<span style="color:#999">รอเรียก</span>'}
      </div>
    </div>`;
  }).join('');
}

async function loadStaff() {
  const staff = await G2G.wbStaffList();
  window._staffMap = {};
  staff.forEach(s => window._staffMap[s.slug] = s);
  document.getElementById('k-staff').textContent = staff.length;
  document.getElementById('staff-list').innerHTML = staff.map(s => `
    <a href="me.html?slug=${s.slug}" class="adm-card" style="text-decoration:none;border-left:4px solid ${s.color}">
      <div class="adm-card-b" style="padding:14px 16px">
        <div style="font-size:11px;color:${s.color};letter-spacing:0.06em;font-weight:600;text-transform:uppercase">${G2G.escapeHtml(s.dept)}</div>
        <h4 style="font-size:15px;margin:4px 0">${G2G.escapeHtml(s.nickname || s.name)}</h4>
        <div style="font-size:12px;color:var(--ink-4)">${G2G.escapeHtml(s.role)}</div>
      </div>
    </a>
  `).join('');
}

async function openCreate() {
  const title = prompt('ชื่องาน:');
  if (!title) return;
  const cat = prompt('หมวด (เช่น [Marketing], [Finance], [IT]):', '[General]');
  const desc = prompt('รายละเอียดงาน:') || '';
  const priority = prompt('priority (low/normal/high):', 'normal') || 'normal';
  const r = await G2G.wbCreate({ title, description: desc, category: cat, priority, createdBy: 'admin' });
  if (r.ok) { alert('สร้างงานแล้ว · ID = ' + r.taskId); loadBoard(); }
  else alert(r.error || 'failed');
}

(async function init() {
  await loadStaff();
  await loadBoard();
})();
</script>
</body>
</html>
