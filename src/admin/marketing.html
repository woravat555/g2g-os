<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>การตลาด · Marketing · G2G Internal OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_admin.css">
</head>
<body>
<div class="adm-shell">
  <aside class="adm-side"></aside>
  <div class="adm-main">
    <header class="adm-top"></header>
    <main class="adm-body">

      <div class="qstats">
        <div class="kpi"><div class="lbl">LINE OAs</div><div class="val" id="kLine">—</div><div class="delta">LINE_OA_Registry</div></div>
        <div class="kpi"><div class="lbl">เกษตรกร</div><div class="val" id="kFarmers">—</div><div class="delta">FarmerRegistry</div></div>
        <div class="kpi"><div class="lbl">Conversations</div><div class="val" id="kConv">—</div><div class="delta">บทสนทนาทั้งหมด</div></div>
        <div class="kpi"><div class="lbl">Content</div><div class="val" id="kContent">—</div><div class="delta">ContentLog</div></div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>LINE OA Network</h2><span class="sub">5 channels · DM-only · 09:00-21:00</span></div>
        <div class="adm-card flat">
          <div id="t-line"><div class="adm-loading">โหลด...</div></div>
        </div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>บทสนทนาล่าสุด · Conversations</h2><span class="sub">50 บทสนทนาล่าสุด</span></div>
        <div class="adm-card flat">
          <div id="t-conv"><div class="adm-loading">โหลด...</div></div>
        </div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>Content Production</h2><span class="sub">คลิป · ภาพ · TTS</span></div>
        <div class="adm-card flat">
          <div id="t-content"><div class="adm-loading">โหลด...</div></div>
        </div>
      </div>

    </main>
  </div>
</div>
<script src="_admin.js"></script>
<script>
  G2G.boot('marketing', { title: 'การตลาด', crumbs: [{ label: 'Dashboard', href: 'index.html' }, { label: 'การตลาด' }] });
  (async function() {
    const s = await G2G.loadDashboard();
    const c = s.counts || {};
    document.getElementById('kLine').textContent = c.LINE_OA_Registry ?? '—';
    document.getElementById('kFarmers').textContent = c.FarmerRegistry ?? '—';
    document.getElementById('kConv').textContent = c.Conversations ?? '—';

    const [line, conv, content] = await Promise.all([
      G2G.loadTab('LINE_OA_Registry'),
      G2G.loadTab('Conversations', 30),
      G2G.loadTab('ContentLog')
    ]);
    G2G.renderTable(document.getElementById('t-line'), line.columns||[], line.rows||[], { maxRows: 20 });
    G2G.renderTable(document.getElementById('t-conv'), conv.columns||[], conv.rows||[], { maxRows: 30, showCols: ['oaChannel','category','userMessage','aiResponse'] });
    document.getElementById('kContent').textContent = content.total ?? '—';
    G2G.renderTable(document.getElementById('t-content'), content.columns||[], content.rows||[], { maxRows: 20 });
  })();
</script>
</body>
</html>
