<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ขายสินค้า · Sales · G2G Internal OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_admin.css">
</head>
<body>
<div class="adm-shell">
  <aside class="adm-side"></aside>
  <div class="adm-main">
    <header class="adm-top"></header>
    <main class="adm-body">

      <div class="qstats">
        <div class="kpi"><div class="lbl">ออร์เดอร์</div><div class="val" id="kOrders">—</div><div class="delta">Orders</div></div>
        <div class="kpi"><div class="lbl">ผู้ซื้อ/ล้ง</div><div class="val" id="kBuyers">—</div><div class="delta">Buyers</div></div>
        <div class="kpi"><div class="lbl">สินค้า</div><div class="val" id="kProducts">—</div><div class="delta">Products</div></div>
        <div class="kpi"><div class="lbl">ราคาตลาด</div><div class="val" id="kPrices">—</div><div class="delta">MarketPrices</div></div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>ออร์เดอร์ · Orders</h2><span class="sub">live จาก Orders tab</span></div>
        <div class="adm-card flat">
          <div id="t-orders"><div class="adm-loading">โหลด...</div></div>
        </div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>ผู้ซื้อ · Buyers</h2><span class="sub">ล้ง · ผู้ส่งออก · Modern Trade</span></div>
        <div class="adm-card flat">
          <div id="t-buyers"><div class="adm-loading">โหลด...</div></div>
        </div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>สินค้า · Products</h2><span class="sub">catalog ของ G2G</span></div>
        <div class="adm-card flat">
          <div id="t-products"><div class="adm-loading">โหลด...</div></div>
        </div>
      </div>

      <div class="adm-section">
        <div class="h"><h2>ราคาตลาด · MarketPrices</h2><span class="sub">real-time prices · 71 entries</span></div>
        <div class="adm-card flat">
          <div id="t-prices"><div class="adm-loading">โหลด...</div></div>
        </div>
      </div>

    </main>
  </div>
</div>
<script src="_admin.js"></script>
<script>
  G2G.boot('sales', { title: 'ขายสินค้า', crumbs: [{ label: 'Dashboard', href: 'index.html' }, { label: 'ขาย' }] });
  (async function() {
    const s = await G2G.loadDashboard();
    const c = s.counts || {};
    document.getElementById('kOrders').textContent = c.Orders ?? '—';
    document.getElementById('kBuyers').textContent = c.Buyers ?? '—';
    document.getElementById('kProducts').textContent = c.Products ?? '—';
    document.getElementById('kPrices').textContent = c.MarketPrices ?? '—';

    const [orders, buyers, products, prices] = await Promise.all([
      G2G.loadTab('Orders'),
      G2G.loadTab('Buyers'),
      G2G.loadTab('Products'),
      G2G.loadTab('MarketPrices', 30)
    ]);
    G2G.renderTable(document.getElementById('t-orders'), orders.columns||[], orders.rows||[], { maxRows: 30 });
    G2G.renderTable(document.getElementById('t-buyers'), buyers.columns||[], buyers.rows||[], { maxRows: 30 });
    G2G.renderTable(document.getElementById('t-products'), products.columns||[], products.rows||[], { maxRows: 30 });
    G2G.renderTable(document.getElementById('t-prices'), prices.columns||[], prices.rows||[], { maxRows: 30 });
  })();
</script>
</body>
</html>
